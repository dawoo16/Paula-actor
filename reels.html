<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="reels.css" />
  <title>Showreel</title>
</head>
<body>
  <canvas id="stars-bg"></canvas>
  <a href="index.html" class="main-link">MAIN PAGE</a>

<div class="video-wrapper">
  <div class="video-cover" id="video-cover">
    <img src="image0.jpeg" alt="Showreel" class="video-thumbnail" />
    <div class="play-button">&#9658;</div>
  </div>

  <div id="youtube-player" class="hidden">
    <iframe
      id="yt-iframe"
      width="100%"
      height="100%"
      src="https://www.youtube.com/watch?v=nM0p1pwZXxU"
      title="YouTube video player"
      frameborder="0"
      allow="autoplay; encrypted-media; picture-in-picture"
      allowfullscreen
    ></iframe>
  </div>
</div>

<script>
  const cover = document.getElementById("video-cover");
  const player = document.getElementById("youtube-player");
  const iframe = document.getElementById("yt-iframe");

  cover.addEventListener("click", () => {
    cover.classList.add("hidden");
    player.classList.remove("hidden");

    // Ensure autoplay triggers after showing (some browsers behave better this way)
    if (!iframe.src.includes("autoplay=1")) {
      iframe.src = iframe.src.replace("autoplay=0", "autoplay=1");
    }
  });
</script>

</body>
</html>
